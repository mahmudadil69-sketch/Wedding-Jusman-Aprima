<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jusman & Aprima Wedding</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Parisienne&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css?v=2">
</head>

<body>

    <!-- HERO SECTION -->   
    <section class="hero"> 
        <div class="content d-flex flex-column align-items-center text-center">
        <h2>Save The Date</h2>
        <img src="img/Pengantin JA.png" class="pengantin mb-2">
        <h1 class="nama">Jusman & Aprima</h1>
        <p>Kepada Bapak/Ibu/Saudara/i</p>
        <h4 class="tamu" id="namaTamu">Nama Tamu</h4>
        <p class="deskripsi">
            Dengan segala hormat, kami mengundang Bapak/Ibu/Saudara(i)
            untuk hadir dan memberikan doa terbaik di hari bahagia kami.
            
        </p>
        <a href="#" id="btnUndangan" class="btn btn-undangan">Lihat Undangan</a>
        <p class="note mt-3">
            Mohon maaf apabila ada kesalahan nama/gelar
        </p>

    </div>
    </section>


    <!-- FOOTER -->
    <footer class="text-center py-3 bg-light">
        <p>© 2026 Jusman & Aprima</p>
    </footer>

    <!-- Bootstrap JS (WAJIB ini, bukan cuma popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
   <script>
    const urlParams = new URLSearchParams(window.location.search);
    let nama = urlParams.get('to');

    if (nama) {
        nama = nama.replace(/\+/g, ' ');
        document.getElementById('namaTamu').textContent = decodeURIComponent(nama);
    }

    document.getElementById('btnUndangan').addEventListener('click', function (e) {
        e.preventDefault();

        // tambahkan animasi ke body
        document.body.classList.add("zoom-out");

        setTimeout(() => {
            if (nama) {
                window.location.href = "undangan.html?to=" + encodeURIComponent(nama);
            } else {
                window.location.href = "undangan.html";
            }
        }, 600); // harus sama dengan durasi animasi
    });
</script>
 

</body>

</html>
